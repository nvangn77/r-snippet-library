name: Deploy to GitHub Pages

# Publishes index.html so the app launches from a single URL.
# One-time setup: repo Settings → Pages → Build and deployment →
# Source = "GitHub Actions". After that, every push to main redeploys.

on:
  push:
    branches: [main]
  workflow_dispatch:        # lets you deploy on demand from the Actions tab

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; newer pushes supersede in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true    # turn Pages on automatically — no manual setup needed

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'          # repo root; index.html is the entry point

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
