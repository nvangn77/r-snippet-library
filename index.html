<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>R Snippet Library</title>
<style>
  :root {
    --bg: #F5F4F0;
    --bg-elev: #FBFAF7;
    --bg-card: #FFFFFF;
    --border: #E2E0D8;
    --text: #24241F;
    --text-dim: #6B6A60;
    --accent: #4A7C4F;
    --accent-soft: #E6EFE6;
    --accent-text: #FFFFFF;
    --pill-bg: #ECEAE2;
    --pill-text: #50504A;
    --code-bg: #F1EFE8;
    --danger: #B4534B;
    --shadow: 0 1px 2px rgba(0,0,0,.05), 0 4px 12px rgba(0,0,0,.04);
    --radius: 10px;
  }
  html[data-theme="dark"] {
    --bg: #1A1A1D;
    --bg-elev: #222226;
    --bg-card: #26262B;
    --border: #36363C;
    --text: #E8E7E2;
    --text-dim: #9A998F;
    --accent: #7BAE7F;
    --accent-soft: #2A3A2C;
    --accent-text: #14140F;
    --pill-bg: #33333A;
    --pill-text: #C2C1B8;
    --code-bg: #1E1E22;
    --danger: #D9776E;
    --shadow: 0 1px 2px rgba(0,0,0,.3), 0 6px 18px rgba(0,0,0,.25);
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    font-size: 15px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  button { font-family: inherit; cursor: pointer; }
  a { color: var(--accent); }

  /* Header */
  header {
    position: sticky; top: 0; z-index: 20;
    display: flex; align-items: center; gap: 14px;
    padding: 12px 20px;
    background: var(--bg-elev);
    border-bottom: 1px solid var(--border);
  }
  .brand { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 17px; white-space: nowrap; }
  .brand .logo {
    width: 30px; height: 30px; border-radius: 8px;
    background: var(--accent); color: var(--accent-text);
    display: grid; place-items: center; font-weight: 800; font-size: 15px;
  }
  .search-wrap { flex: 1; max-width: 520px; position: relative; }
  #search {
    width: 100%; padding: 9px 12px 9px 34px;
    border: 1px solid var(--border); border-radius: 8px;
    background: var(--bg-card); color: var(--text); font-size: 14px;
  }
  #search:focus { outline: 2px solid var(--accent); outline-offset: -1px; }
  .search-wrap .icon { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: var(--text-dim); }
  .header-spacer { flex: 1; }
  .control {
    background: var(--bg-card); color: var(--text);
    border: 1px solid var(--border); border-radius: 8px;
    padding: 8px 11px; font-size: 13px;
  }
  select.control { cursor: pointer; }
  .btn-accent { background: var(--accent); color: var(--accent-text); border: 1px solid var(--accent); border-radius: 8px; padding: 8px 14px; font-weight: 600; font-size: 13px; }
  .btn-accent:hover { filter: brightness(1.05); }
  .icon-btn { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; width: 36px; height: 36px; display: grid; place-items: center; color: var(--text); }
  .icon-btn:hover { background: var(--accent-soft); }
  #hamburger { display: none; }

  /* Layout */
  .layout { display: grid; grid-template-columns: 248px 1fr; align-items: start; }
  aside {
    position: sticky; top: 61px; align-self: start;
    height: calc(100vh - 61px); overflow-y: auto;
    border-right: 1px solid var(--border);
    padding: 16px 10px 40px;
    background: var(--bg-elev);
  }
  .nav-section { margin-bottom: 18px; }
  .nav-section h3 { font-size: 11px; letter-spacing: .08em; text-transform: uppercase; color: var(--text-dim); margin: 4px 8px 6px; }
  .nav-item {
    display: flex; justify-content: space-between; align-items: center; gap: 8px;
    width: 100%; text-align: left; background: none; border: none;
    color: var(--text); padding: 7px 9px; border-radius: 7px; font-size: 13.5px;
  }
  .nav-item:hover { background: var(--accent-soft); }
  .nav-item.active { background: var(--accent); color: var(--accent-text); font-weight: 600; }
  .nav-item .count { font-size: 11.5px; color: var(--text-dim); background: var(--pill-bg); border-radius: 20px; padding: 1px 7px; }
  .nav-item.active .count { color: var(--accent-text); background: rgba(255,255,255,.22); }

  .tagbrowser { display: flex; flex-wrap: wrap; gap: 6px; padding: 2px 8px; }
  .tagbrowser .tagchip {
    background: var(--pill-bg); color: var(--pill-text); border: none;
    border-radius: 20px; padding: 3px 9px; font-size: 12px;
  }
  .tagbrowser .tagchip:hover { background: var(--accent-soft); color: var(--text); }
  .tagbrowser .tagchip.active { background: var(--accent); color: var(--accent-text); }
  .tagbrowser .tagchip .c { opacity: .7; margin-left: 4px; }

  /* Main */
  main { padding: 22px 28px 80px; max-width: 920px; }
  .result-bar { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
  .result-bar .count-line { color: var(--text-dim); font-size: 13.5px; }
  .active-filter { display: inline-flex; align-items: center; gap: 6px; background: var(--accent-soft); color: var(--accent); border-radius: 20px; padding: 3px 10px; font-size: 12.5px; font-weight: 600; }
  .active-filter button { background: none; border: none; color: inherit; font-size: 14px; line-height: 1; padding: 0; }

  .card {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: var(--radius); margin-bottom: 12px; overflow: hidden;
    box-shadow: var(--shadow);
  }
  .card-head { display: flex; align-items: center; gap: 14px; padding: 14px 16px; cursor: pointer; }
  .card-head:hover { background: var(--accent-soft); }
  .card-head .titles { flex: 1; min-width: 0; }
  .card-head .title { font-weight: 650; font-size: 15px; }
  .card-head .sub { color: var(--text-dim); font-size: 12.5px; margin-top: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .cat-chip { font-size: 11px; font-weight: 600; color: var(--accent); background: var(--accent-soft); border-radius: 6px; padding: 2px 8px; white-space: nowrap; }
  .thumb { width: 64px; height: 44px; border-radius: 6px; border: 1px solid var(--border); overflow: hidden; flex-shrink: 0; background: var(--code-bg); }
  .thumb svg, .preview-lg svg { width: 100%; height: 100%; display: block; }
  .chevron { color: var(--text-dim); transition: transform .15s; flex-shrink: 0; }
  .card.open .chevron { transform: rotate(90deg); }

  .card-body { display: none; padding: 0 16px 16px; }
  .card.open .card-body { display: block; }
  .card-body .desc { color: var(--text-dim); font-size: 13.5px; margin: 4px 0 12px; }
  .preview-lg { width: 100%; max-width: 420px; height: 200px; border: 1px solid var(--border); border-radius: 8px; background: var(--code-bg); margin: 0 0 14px; overflow: hidden; }
  .code-wrap { position: relative; }
  pre {
    margin: 0; background: var(--code-bg); border: 1px solid var(--border);
    border-radius: 8px; padding: 14px 14px; overflow-x: auto;
    font-family: "SF Mono", "JetBrains Mono", Menlo, Consolas, monospace;
    font-size: 12.8px; line-height: 1.55; color: var(--text);
  }
  .copy-btn { position: absolute; top: 8px; right: 8px; background: var(--bg-card); border: 1px solid var(--border); color: var(--text); border-radius: 6px; padding: 4px 9px; font-size: 12px; }
  .copy-btn:hover { background: var(--accent-soft); }
  .tags-row { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px; }
  .tag-pill { background: var(--pill-bg); color: var(--pill-text); border: none; border-radius: 20px; padding: 3px 10px; font-size: 12px; }
  .tag-pill:hover { background: var(--accent); color: var(--accent-text); }
  .tag-pill::before { content: "#"; opacity: .5; }
  .card-actions { display: flex; gap: 8px; margin-top: 14px; flex-wrap: wrap; }
  .mini-btn { background: var(--bg-elev); border: 1px solid var(--border); color: var(--text); border-radius: 7px; padding: 6px 12px; font-size: 12.5px; }
  .mini-btn:hover { background: var(--accent-soft); }
  .mini-btn.danger { color: var(--danger); }
  .mini-btn.danger:hover { background: var(--danger); color: #fff; border-color: var(--danger); }

  .empty { text-align: center; color: var(--text-dim); padding: 60px 20px; }

  /* Modal */
  .modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,.45); display: none; z-index: 50; align-items: flex-start; justify-content: center; padding: 40px 16px; overflow-y: auto; }
  .modal-backdrop.open { display: flex; }
  .modal { background: var(--bg-card); border: 1px solid var(--border); border-radius: 14px; width: 100%; max-width: 680px; box-shadow: var(--shadow); }
  .modal h2 { margin: 0; padding: 18px 22px; border-bottom: 1px solid var(--border); font-size: 17px; }
  .modal form { padding: 18px 22px 22px; }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 12.5px; font-weight: 600; color: var(--text-dim); margin-bottom: 5px; }
  .field input, .field textarea, .field select {
    width: 100%; padding: 9px 11px; border: 1px solid var(--border); border-radius: 8px;
    background: var(--bg-elev); color: var(--text); font-size: 14px; font-family: inherit;
  }
  .field textarea { resize: vertical; }
  .field textarea.code { font-family: "SF Mono", Menlo, Consolas, monospace; font-size: 13px; min-height: 180px; }
  .field input:focus, .field textarea:focus, .field select:focus { outline: 2px solid var(--accent); outline-offset: -1px; }
  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 8px; }

  @media (max-width: 820px) {
    .layout { grid-template-columns: 1fr; }
    aside {
      position: fixed; top: 61px; left: 0; bottom: 0; width: 270px; z-index: 30;
      transform: translateX(-100%); transition: transform .2s; box-shadow: var(--shadow);
    }
    body.nav-open aside { transform: translateX(0); }
    #hamburger { display: grid; }
    .search-wrap { max-width: none; }
    main { padding: 18px 16px 80px; }
  }
  .field-row { } @media (max-width: 520px){ .field-row { grid-template-columns: 1fr; } }
</style>
</head>
<body>
  <header>
    <button id="hamburger" class="icon-btn" title="Menu" aria-label="Toggle menu">☰</button>
    <div class="brand"><span class="logo">R</span><span class="brand-text">Snippet Library</span></div>
    <div class="search-wrap">
      <span class="icon">⌕</span>
      <input id="search" type="text" placeholder="Search snippets…  ( / )" autocomplete="off" />
    </div>
    <div class="header-spacer"></div>
    <select id="sort" class="control" title="Sort">
      <option value="newest">Newest</option>
      <option value="updated">Recently updated</option>
      <option value="az">A–Z</option>
      <option value="category">By category</option>
    </select>
    <button id="addBtn" class="btn-accent">+ New</button>
    <select id="moreMenu" class="control" title="More">
      <option value="">⋯</option>
      <option value="export">Export JSON</option>
      <option value="import">Import JSON</option>
      <option value="reset">Reset to defaults</option>
    </select>
    <button id="themeBtn" class="icon-btn" title="Toggle theme">◐</button>
    <input id="importFile" type="file" accept="application/json" style="display:none" />
  </header>

  <div class="layout">
    <aside id="sidebar"></aside>
    <main>
      <div class="result-bar">
        <span class="count-line" id="countLine"></span>
        <span id="activeFilterWrap"></span>
      </div>
      <div id="list"></div>
    </main>
  </div>

  <div class="modal-backdrop" id="modalBackdrop">
    <div class="modal">
      <h2 id="modalTitle">New snippet</h2>
      <form id="snippetForm">
        <input type="hidden" id="f_id" />
        <div class="field">
          <label for="f_title">Title</label>
          <input id="f_title" required />
        </div>
        <div class="field-row">
          <div class="field">
            <label for="f_category">Category</label>
            <select id="f_category"></select>
          </div>
          <div class="field">
            <label for="f_previewType">Preview type (visualization only)</label>
            <select id="f_previewType"></select>
          </div>
        </div>
        <div class="field">
          <label for="f_description">Description</label>
          <input id="f_description" />
        </div>
        <div class="field">
          <label for="f_tags">Tags (comma-separated)</label>
          <input id="f_tags" placeholder="ggplot2, survival, cohort" />
        </div>
        <div class="field">
          <label for="f_code">R code</label>
          <textarea id="f_code" class="code" required></textarea>
        </div>
        <div class="modal-actions">
          <button type="button" class="mini-btn" id="cancelBtn">Cancel</button>
          <button type="submit" class="btn-accent">Save snippet</button>
        </div>
      </form>
    </div>
  </div>

<script>
"use strict";

/* ============================================================
   Category configuration  (4 sections, 20 categories)
   ============================================================ */
const SECTIONS = [
  { name: "Setup & data", cats: [
    ["setup", "Setup & environment"],
    ["import", "Data import"],
    ["cleaning", "Data cleaning"],
  ]},
  { name: "Study design", cats: [
    ["cohort", "Cohort construction"],
    ["exposure", "Exposure & outcome"],
    ["causal", "Causal inference & design"],
    ["confounding", "Confounding & bias"],
    ["matching", "Matching"],
    ["selfcontrolled", "Self-controlled designs"],
  ]},
  { name: "Analysis", cats: [
    ["descriptive", "Descriptive analysis"],
    ["survival", "Survival analysis"],
    ["regression", "Regression & inference"],
    ["longitudinal", "Longitudinal & panel"],
    ["screening", "Screening & diagnostics"],
    ["prediction", "Prediction modeling"],
    ["meta", "Meta-analysis"],
    ["spatial", "Spatial epidemiology"],
    ["genomic", "Genomic & molecular epi"],
  ]},
  { name: "Output", cats: [
    ["visualization", "Visualization"],
    ["reporting", "Reporting"],
  ]},
];
const CAT_LABEL = {};
SECTIONS.forEach(s => s.cats.forEach(([id, label]) => CAT_LABEL[id] = label));

/* Visualization preview types (25) */
const PREVIEW_TYPES = [
  "forest_plot","km_curve","scatter","heatmap","dag","bar_chart","line_trend",
  "box_plot","histogram","funnel_plot","roc_curve","calibration","epi_curve",
  "choropleth","violin","cumulative_incidence","density","dose_response",
  "lollipop","spaghetti","corr_matrix","pyramid","ridgeline","stacked_area","bland_altman"
];

/* ============================================================
   SVG previews — all colours via CSS vars so they recolour
   automatically in light / dark mode.
   ============================================================ */
function svgPreview(type) {
  const A = "var(--accent)";
  const G = "var(--text-dim)";
  const T = "var(--text)";
  const open = '<svg viewBox="0 0 120 80" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg">';
  const ax = `<line x1="14" y1="68" x2="112" y2="68" stroke="${G}" stroke-width="1"/><line x1="14" y1="8" x2="14" y2="68" stroke="${G}" stroke-width="1"/>`;
  let body = "";
  switch (type) {
    case "forest_plot": {
      const rows = [[40,30],[62,18],[78,22],[55,26]];
      body = `<line x1="63" y1="8" x2="63" y2="70" stroke="${G}" stroke-dasharray="2 2" stroke-width="1"/>`;
      rows.forEach((r,i)=>{ const y=16+i*13; body+=`<line x1="${r[0]}" y1="${y}" x2="${r[0]+r[1]}" y2="${y}" stroke="${A}" stroke-width="1.4"/><rect x="${(r[0]+r[0]+r[1])/2-2}" y="${y-2}" width="4" height="4" fill="${A}"/>`; });
      body += `<path d="M55 72 L63 64 L71 72 Z" fill="${A}" opacity=".7"/>`;
      break; }
    case "km_curve": {
      body = ax + `<path d="M14 14 H40 V26 H64 V30 H82 V42 H104 V46" fill="none" stroke="${A}" stroke-width="1.8"/><path d="M14 20 H44 V34 H70 V42 H92 V54 H110" fill="none" stroke="${G}" stroke-width="1.4" stroke-dasharray="3 2"/>`;
      break; }
    case "scatter": {
      body = ax; const pts=[[24,52],[34,46],[40,50],[48,40],[56,38],[62,30],[70,34],[78,24],[88,20],[96,16],[50,44],[66,28]];
      pts.forEach(p=> body+=`<circle cx="${p[0]}" cy="${p[1]}" r="2.4" fill="${A}" opacity=".8"/>`);
      body += `<line x1="20" y1="56" x2="104" y2="14" stroke="${G}" stroke-width="1.2"/>`;
      break; }
    case "heatmap": {
      const op=[.2,.5,.8,.4,.7,.3,.9,.6,.25,.55,.85,.45];
      for(let r=0;r<4;r++)for(let c=0;c<6;c++){const i=(r*6+c)%op.length;body+=`<rect x="${20+c*14}" y="${12+r*13}" width="13" height="12" fill="${A}" opacity="${op[i]}"/>`;}
      break; }
    case "dag": {
      const node=(x,y,l)=>`<circle cx="${x}" cy="${y}" r="8" fill="var(--bg-card)" stroke="${A}" stroke-width="1.4"/><text x="${x}" y="${y+3}" font-size="8" fill="${T}" text-anchor="middle">${l}</text>`;
      const arr=(x1,y1,x2,y2)=>`<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${G}" stroke-width="1.2" marker-end="url(#ah)"/>`;
      body = `<defs><marker id="ah" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><path d="M0 0 L6 3 L0 6 Z" fill="${G}"/></marker></defs>`+
        arr(28,40,52,40)+arr(40,18,55,33)+arr(40,18,80,33)+node(20,40,"E")+node(60,40,"O")+node(40,16,"C");
      break; }
    case "bar_chart": {
      body = ax; const h=[20,38,28,48,34,52]; h.forEach((v,i)=> body+=`<rect x="${22+i*15}" y="${68-v}" width="10" height="${v}" fill="${A}" opacity=".85"/>`);
      break; }
    case "line_trend": {
      body = ax + `<polyline points="16,58 32,50 48,54 64,38 80,42 96,24 110,18" fill="none" stroke="${A}" stroke-width="1.8"/>`;
      break; }
    case "box_plot": {
      const box=(x,lo,q1,q3,hi,med)=>`<line x1="${x}" y1="${lo}" x2="${x}" y2="${hi}" stroke="${G}" stroke-width="1"/><rect x="${x-7}" y="${q3}" width="14" height="${q1-q3}" fill="${A}" opacity=".7" stroke="${A}"/><line x1="${x-7}" y1="${med}" x2="${x+7}" y2="${med}" stroke="${T}" stroke-width="1.4"/>`;
      body = ax + box(34,60,52,34,18,44) + box(62,58,48,30,14,40) + box(90,62,54,38,22,46);
      break; }
    case "histogram": {
      body = ax; const h=[10,22,34,46,40,30,18,10]; h.forEach((v,i)=> body+=`<rect x="${16+i*12}" y="${68-v}" width="11" height="${v}" fill="${A}" opacity=".8" stroke="var(--bg-card)"/>`);
      break; }
    case "funnel_plot": {
      body = ax + `<line x1="63" y1="10" x2="63" y2="68" stroke="${G}" stroke-dasharray="2 2"/><path d="M63 12 L100 66 L26 66 Z" fill="none" stroke="${G}" stroke-width="1" opacity=".6"/>`;
      const pts=[[60,20],[68,22],[55,30],[72,32],[50,42],[78,44],[63,16],[58,50],[70,52]];
      pts.forEach(p=> body+=`<circle cx="${p[0]}" cy="${p[1]}" r="2.3" fill="${A}" opacity=".8"/>`);
      break; }
    case "roc_curve": {
      body = ax + `<line x1="14" y1="68" x2="112" y2="8" stroke="${G}" stroke-dasharray="3 2"/><path d="M14 68 C30 30, 50 18, 112 8" fill="none" stroke="${A}" stroke-width="1.8"/>`;
      break; }
    case "calibration": {
      body = ax + `<line x1="14" y1="68" x2="112" y2="8" stroke="${G}" stroke-dasharray="3 2"/><polyline points="16,64 36,52 56,46 76,30 96,20 110,12" fill="none" stroke="${A}" stroke-width="1.8"/>`;
      [[36,52],[56,46],[76,30],[96,20]].forEach(p=> body+=`<circle cx="${p[0]}" cy="${p[1]}" r="2.2" fill="${A}"/>`);
      break; }
    case "epi_curve": {
      body = ax; const h=[6,12,22,34,46,52,40,30,20,12]; h.forEach((v,i)=> body+=`<rect x="${16+i*9.6}" y="${68-v}" width="8.6" height="${v}" fill="${A}" opacity=".8" stroke="var(--bg-card)"/>`);
      break; }
    case "choropleth": {
      const reg=[["M14 14 H50 V36 H30 V50 H14 Z",.35],["M50 14 H92 V30 H50 Z",.7],["M92 14 H110 V44 H92 Z",.5],["M30 36 H72 V60 H40 V50 H30 Z",.85],["M72 30 H110 V62 H72 Z",.45]];
      reg.forEach(r=> body+=`<path d="${r[0]}" fill="${A}" opacity="${r[1]}" stroke="var(--bg-card)" stroke-width="1"/>`);
      break; }
    case "violin": {
      const v=(x)=>`<path d="M${x} 14 C${x-12} 26, ${x-12} 40, ${x} 50 C${x+12} 40, ${x+12} 26, ${x} 14 Z" fill="${A}" opacity=".6" stroke="${A}"/><line x1="${x}" y1="16" x2="${x}" y2="60" stroke="${T}" stroke-width="1"/>`;
      body = ax + v(36) + v(64) + v(92);
      break; }
    case "cumulative_incidence": {
      body = ax + `<path d="M14 66 C36 60, 56 44, 80 30 S104 16, 110 12" fill="none" stroke="${A}" stroke-width="1.8"/><path d="M14 66 C40 62, 60 52, 84 44 S106 36, 110 34" fill="none" stroke="${G}" stroke-width="1.4" stroke-dasharray="3 2"/>`;
      break; }
    case "density": {
      body = ax + `<path d="M14 68 C36 68, 40 18, 56 18 S76 68, 110 68 Z" fill="${A}" opacity=".25" stroke="${A}" stroke-width="1.6"/>`;
      break; }
    case "dose_response": {
      body = ax + `<path d="M16 60 C40 58, 52 30, 70 26 S100 18, 110 14" fill="none" stroke="${A}" stroke-width="1.8"/>`;
      [[16,60],[34,52],[52,34],[70,26],[88,20],[106,14]].forEach(p=> body+=`<circle cx="${p[0]}" cy="${p[1]}" r="2.2" fill="${A}"/>`);
      break; }
    case "lollipop": {
      body = ax; const v=[[30,28],[48,44],[66,20],[84,52],[102,36]]; v.forEach(p=> body+=`<line x1="${p[0]}" y1="68" x2="${p[0]}" y2="${p[1]}" stroke="${G}" stroke-width="1.2"/><circle cx="${p[0]}" cy="${p[1]}" r="3.2" fill="${A}"/>`);
      break; }
    case "spaghetti": {
      const paths=["M16,52 C40,48 60,40 110,30","M16,58 C40,40 60,52 110,22","M16,46 C40,54 60,34 110,40","M16,62 C40,56 60,48 110,44"];
      body = ax; paths.forEach((d,i)=> body+=`<path d="${d}" fill="none" stroke="${i===0?A:G}" stroke-width="${i===0?1.8:1}" opacity="${i===0?1:.6}"/>`);
      break; }
    case "corr_matrix": {
      const op=[1,.3,.6,.2,.3,1,.1,.7,.6,.1,1,.4,.2,.7,.4,1];
      for(let r=0;r<4;r++)for(let c=0;c<4;c++){const val=op[r*4+c];body+=`<circle cx="${30+c*18}" cy="${18+r*15}" r="${3+val*4}" fill="${A}" opacity="${.3+val*.6}"/>`;}
      break; }
    case "pyramid": {
      for(let i=0;i<5;i++){const w=10+i*6;const y=14+i*10;body+=`<rect x="${60-w}" y="${y}" width="${w-1}" height="8" fill="${A}" opacity=".8"/><rect x="61" y="${y}" width="${w-1}" height="8" fill="${G}" opacity=".7"/>`;}
      break; }
    case "ridgeline": {
      for(let i=0;i<4;i++){const y=22+i*13;body+=`<path d="M14 ${y} C36 ${y}, 40 ${y-16} 56 ${y-16} S76 ${y}, 110 ${y} Z" fill="${A}" opacity="${.3+i*.12}" stroke="${A}" stroke-width="1"/>`;}
      break; }
    case "stacked_area": {
      body = ax + `<path d="M14 68 L14 50 C40 46 70 40 110 34 L110 68 Z" fill="${A}" opacity=".7"/><path d="M14 50 C40 46 70 40 110 34 L110 22 C70 28 40 34 14 38 Z" fill="${A}" opacity=".35"/>`;
      break; }
    case "bland_altman": {
      body = ax + `<line x1="14" y1="40" x2="112" y2="40" stroke="${A}" stroke-dasharray="3 2"/><line x1="14" y1="22" x2="112" y2="22" stroke="${G}" stroke-dasharray="2 2"/><line x1="14" y1="58" x2="112" y2="58" stroke="${G}" stroke-dasharray="2 2"/>`;
      [[28,38],[40,44],[52,36],[64,42],[76,34],[88,46],[100,38],[46,30],[70,50]].forEach(p=> body+=`<circle cx="${p[0]}" cy="${p[1]}" r="2.2" fill="${A}" opacity=".8"/>`);
      break; }
    default:
      body = `<rect x="20" y="20" width="80" height="40" fill="none" stroke="${G}" stroke-dasharray="3 2"/><text x="60" y="44" font-size="8" fill="${G}" text-anchor="middle">preview</text>`;
  }
  return open + body + "</svg>";
}

/* ============================================================
   Storage layer
   ============================================================ */
const STORE_KEY = "r-snippets-v4";
const THEME_KEY = "r-snippets-theme";

function loadSnippets() {
  try {
    const raw = localStorage.getItem(STORE_KEY);
    if (!raw) { saveSnippets(DEFAULT_SNIPPETS); return DEFAULT_SNIPPETS.slice(); }
    const arr = JSON.parse(raw);
    if (!Array.isArray(arr)) throw new Error("bad");
    return arr;
  } catch (e) {
    return DEFAULT_SNIPPETS.slice();
  }
}
function saveSnippets(arr) {
  localStorage.setItem(STORE_KEY, JSON.stringify(arr));
}

/* ============================================================
   App state
   ============================================================ */
let snippets = loadSnippets();
let state = { activeCategory: null, activeTag: null, query: "", sort: "newest" };

/* ---- helpers ---- */
function uid() { return "u" + Date.now().toString(36) + Math.random().toString(36).slice(2, 6); }
function esc(s) { return String(s == null ? "" : s).replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c])); }

function getFiltered() {
  const q = state.query.trim().toLowerCase();
  let out = snippets.filter(s => {
    if (state.activeCategory && s.category !== state.activeCategory) return false;
    if (state.activeTag && !(s.tags || []).map(t => t.toLowerCase()).includes(state.activeTag.toLowerCase())) return false;
    if (q) {
      const hay = (s.title + " " + (s.description||"") + " " + s.code + " " + (s.tags||[]).join(" ")).toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });
  switch (state.sort) {
    case "az": out.sort((a,b)=> a.title.localeCompare(b.title)); break;
    case "updated": out.sort((a,b)=> (b.updated||0)-(a.updated||0)); break;
    case "category": out.sort((a,b)=> (CAT_LABEL[a.category]||a.category).localeCompare(CAT_LABEL[b.category]||b.category) || a.title.localeCompare(b.title)); break;
    default: out.sort((a,b)=> (b.created||0)-(a.created||0));
  }
  return out;
}

/* ============================================================
   Rendering
   ============================================================ */
function renderSidebar() {
  const counts = {};
  snippets.forEach(s => counts[s.category] = (counts[s.category]||0)+1);
  let html = `<button class="nav-item ${!state.activeCategory && !state.activeTag ? "active":""}" data-cat="__all__">
      <span>All snippets</span><span class="count">${snippets.length}</span></button>`;
  SECTIONS.forEach(sec => {
    html += `<div class="nav-section"><h3>${esc(sec.name)}</h3>`;
    sec.cats.forEach(([id,label]) => {
      const c = counts[id]||0;
      html += `<button class="nav-item ${state.activeCategory===id?"active":""}" data-cat="${id}">
        <span>${esc(label)}</span><span class="count">${c}</span></button>`;
    });
    html += `</div>`;
  });

  /* Tag browser */
  const tagCounts = {};
  snippets.forEach(s => (s.tags||[]).forEach(t => tagCounts[t] = (tagCounts[t]||0)+1));
  const tags = Object.keys(tagCounts).sort((a,b)=> tagCounts[b]-tagCounts[a] || a.localeCompare(b));
  html += `<div class="nav-section"><h3>Tags (${tags.length})</h3><div class="tagbrowser">`;
  tags.forEach(t => {
    html += `<button class="tagchip ${state.activeTag===t?"active":""}" data-tag="${esc(t)}">${esc(t)}<span class="c">${tagCounts[t]}</span></button>`;
  });
  html += `</div></div>`;

  const aside = document.getElementById("sidebar");
  aside.innerHTML = html;
  aside.querySelectorAll("[data-cat]").forEach(b => b.addEventListener("click", () => {
    const c = b.getAttribute("data-cat");
    state.activeCategory = (c === "__all__") ? null : c;
    state.activeTag = null;
    document.body.classList.remove("nav-open");
    render();
  }));
  aside.querySelectorAll("[data-tag]").forEach(b => b.addEventListener("click", () => {
    state.activeTag = b.getAttribute("data-tag");
    state.activeCategory = null;
    document.body.classList.remove("nav-open");
    render();
  }));
}

function renderList() {
  const list = getFiltered();
  document.getElementById("countLine").textContent =
    `${list.length} snippet${list.length===1?"":"s"}` +
    (state.activeCategory ? ` in ${CAT_LABEL[state.activeCategory]}` : "");

  const afw = document.getElementById("activeFilterWrap");
  if (state.activeTag) {
    afw.innerHTML = `<span class="active-filter">#${esc(state.activeTag)} <button title="Clear">✕</button></span>`;
    afw.querySelector("button").addEventListener("click", () => { state.activeTag = null; render(); });
  } else afw.innerHTML = "";

  const el = document.getElementById("list");
  if (!list.length) { el.innerHTML = `<div class="empty">No snippets match. Try a different search or filter.</div>`; return; }

  el.innerHTML = list.map(s => {
    const thumb = (s.category === "visualization" && s.previewType)
      ? `<div class="thumb">${svgPreview(s.previewType)}</div>` : "";
    const big = (s.category === "visualization" && s.previewType)
      ? `<div class="preview-lg">${svgPreview(s.previewType)}</div>` : "";
    const tags = (s.tags||[]).map(t => `<button class="tag-pill" data-tag="${esc(t)}">${esc(t)}</button>`).join("");
    return `<div class="card" data-id="${esc(s.id)}">
      <div class="card-head">
        ${thumb}
        <div class="titles">
          <div class="title">${esc(s.title)}</div>
          <div class="sub">${esc(s.description||"")}</div>
        </div>
        <span class="cat-chip">${esc(CAT_LABEL[s.category]||s.category)}</span>
        <span class="chevron">›</span>
      </div>
      <div class="card-body">
        <div class="desc">${esc(s.description||"")}</div>
        ${big}
        <div class="code-wrap">
          <pre><code>${esc(s.code)}</code></pre>
          <button class="copy-btn">Copy</button>
        </div>
        <div class="tags-row">${tags}</div>
        <div class="card-actions">
          <button class="mini-btn act-edit">Edit</button>
          <button class="mini-btn act-dup">Duplicate</button>
          <button class="mini-btn danger act-del">Delete</button>
        </div>
      </div>
    </div>`;
  }).join("");

  el.querySelectorAll(".card").forEach(card => {
    const id = card.getAttribute("data-id");
    card.querySelector(".card-head").addEventListener("click", e => {
      if (e.target.closest(".cat-chip")) return;
      card.classList.toggle("open");
    });
    card.querySelector(".copy-btn").addEventListener("click", e => {
      e.stopPropagation();
      const code = snippets.find(x => x.id === id).code;
      copyText(code, e.target);
    });
    card.querySelector(".act-edit").addEventListener("click", () => openModal(id));
    card.querySelector(".act-dup").addEventListener("click", () => duplicateSnippet(id));
    card.querySelector(".act-del").addEventListener("click", () => deleteSnippet(id));
    card.querySelectorAll(".tag-pill").forEach(p => p.addEventListener("click", () => {
      state.activeTag = p.getAttribute("data-tag"); state.activeCategory = null; render();
    }));
  });
}

function render() { renderSidebar(); renderList(); }

function copyText(text, btn) {
  const done = () => { const o = btn.textContent; btn.textContent = "Copied ✓"; setTimeout(()=> btn.textContent = o, 1400); };
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(done).catch(()=> fallbackCopy(text, done));
  } else fallbackCopy(text, done);
}
function fallbackCopy(text, done) {
  const ta = document.createElement("textarea"); ta.value = text; document.body.appendChild(ta);
  ta.select(); try { document.execCommand("copy"); done(); } catch(e){} document.body.removeChild(ta);
}

/* ============================================================
   CRUD + modal
   ============================================================ */
function deleteSnippet(id) {
  const s = snippets.find(x => x.id === id);
  if (!s) return;
  if (!confirm(`Delete “${s.title}”? This cannot be undone.`)) return;
  snippets = snippets.filter(x => x.id !== id);
  saveSnippets(snippets); render();
}

function duplicateSnippet(id) {
  const s = snippets.find(x => x.id === id);
  if (!s) return;
  const copy = JSON.parse(JSON.stringify(s));
  copy.id = uid();
  copy.title = s.title + " (copy)";
  copy.created = Date.now(); copy.updated = Date.now();
  snippets.unshift(copy);
  saveSnippets(snippets); render();
  openModal(copy.id);
}

const modal = document.getElementById("modalBackdrop");
function fillSelectors() {
  const cat = document.getElementById("f_category");
  cat.innerHTML = SECTIONS.flatMap(s => s.cats).map(([id,l]) => `<option value="${id}">${esc(l)}</option>`).join("");
  const pv = document.getElementById("f_previewType");
  pv.innerHTML = `<option value="">— none —</option>` + PREVIEW_TYPES.map(t => `<option value="${t}">${t}</option>`).join("");
}
function openModal(id) {
  const editing = !!id;
  document.getElementById("modalTitle").textContent = editing ? "Edit snippet" : "New snippet";
  const s = editing ? snippets.find(x => x.id === id) : null;
  document.getElementById("f_id").value = editing ? id : "";
  document.getElementById("f_title").value = s ? s.title : "";
  document.getElementById("f_category").value = s ? s.category : "setup";
  document.getElementById("f_previewType").value = s && s.previewType ? s.previewType : "";
  document.getElementById("f_description").value = s ? (s.description||"") : "";
  document.getElementById("f_tags").value = s ? (s.tags||[]).join(", ") : "";
  document.getElementById("f_code").value = s ? s.code : "";
  modal.classList.add("open");
  setTimeout(()=> document.getElementById("f_title").focus(), 30);
}
function closeModal() { modal.classList.remove("open"); }

document.getElementById("snippetForm").addEventListener("submit", e => {
  e.preventDefault();
  const id = document.getElementById("f_id").value;
  const data = {
    title: document.getElementById("f_title").value.trim(),
    category: document.getElementById("f_category").value,
    previewType: document.getElementById("f_previewType").value || undefined,
    description: document.getElementById("f_description").value.trim(),
    tags: document.getElementById("f_tags").value.split(",").map(t => t.trim()).filter(Boolean),
    code: document.getElementById("f_code").value,
  };
  if (id) {
    const s = snippets.find(x => x.id === id);
    Object.assign(s, data, { updated: Date.now() });
  } else {
    snippets.unshift(Object.assign({ id: uid(), created: Date.now(), updated: Date.now() }, data));
  }
  saveSnippets(snippets); closeModal(); render();
});

/* ============================================================
   Import / export / reset
   ============================================================ */
function exportJSON() {
  const blob = new Blob([JSON.stringify(snippets, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = "r-snippets-" + new Date().toISOString().slice(0,10) + ".json";
  a.click(); URL.revokeObjectURL(url);
}
function importJSON(file) {
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const arr = JSON.parse(reader.result);
      if (!Array.isArray(arr)) throw new Error("Not an array");
      const have = new Set(snippets.map(s => s.id));
      let added = 0;
      arr.forEach(s => {
        if (!s || !s.id) { s.id = uid(); }
        if (!have.has(s.id)) { snippets.push(s); have.add(s.id); added++; }
      });
      saveSnippets(snippets); render();
      alert(`Imported ${added} new snippet${added===1?"":"s"} (${arr.length - added} duplicate${arr.length-added===1?"":"s"} skipped).`);
    } catch (err) { alert("Import failed: " + err.message); }
  };
  reader.readAsText(file);
}
function resetDefaults() {
  if (!confirm("Reset library to factory defaults? Your custom snippets will be removed.")) return;
  snippets = DEFAULT_SNIPPETS.slice();
  saveSnippets(snippets); state.activeCategory = null; state.activeTag = null; render();
}

/* ============================================================
   Theme
   ============================================================ */
function applyTheme(t) {
  document.documentElement.setAttribute("data-theme", t);
  localStorage.setItem(THEME_KEY, t);
}
function initTheme() {
  const saved = localStorage.getItem(THEME_KEY);
  applyTheme(saved || (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light"));
}

/* ============================================================
   Wire up controls + keyboard
   ============================================================ */
document.getElementById("search").addEventListener("input", e => { state.query = e.target.value; renderList(); });
document.getElementById("sort").addEventListener("change", e => { state.sort = e.target.value; renderList(); });
document.getElementById("addBtn").addEventListener("click", () => openModal(null));
document.getElementById("cancelBtn").addEventListener("click", closeModal);
modal.addEventListener("click", e => { if (e.target === modal) closeModal(); });
document.getElementById("themeBtn").addEventListener("click", () => {
  applyTheme(document.documentElement.getAttribute("data-theme") === "dark" ? "light" : "dark");
  render();
});
document.getElementById("hamburger").addEventListener("click", () => document.body.classList.toggle("nav-open"));
document.getElementById("moreMenu").addEventListener("change", e => {
  const v = e.target.value; e.target.value = "";
  if (v === "export") exportJSON();
  else if (v === "import") document.getElementById("importFile").click();
  else if (v === "reset") resetDefaults();
});
document.getElementById("importFile").addEventListener("change", e => { if (e.target.files[0]) importJSON(e.target.files[0]); e.target.value = ""; });

document.addEventListener("keydown", e => {
  if (e.key === "/" && document.activeElement.tagName !== "INPUT" && document.activeElement.tagName !== "TEXTAREA") {
    e.preventDefault(); document.getElementById("search").focus();
  } else if (e.key === "Escape") {
    if (modal.classList.contains("open")) { closeModal(); return; }
    const search = document.getElementById("search");
    if (state.query) { state.query = ""; search.value = ""; renderList(); }
    else if (state.activeTag || state.activeCategory) { state.activeTag = null; state.activeCategory = null; render(); }
  }
});

/* ============================================================
   Boot
   ============================================================ */
initTheme();
fillSelectors();
render();
</script>
</body>
</html>
